<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --success: #22c55e;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { color: var(--dark); text-align: center; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.2rem; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit { background: var(--primary); color: white; }
        .btn-submit:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* Admin Dashboard - Initially Hidden */
        #adminSection { 
            display: none; 
            max-width: 900px; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: white;
            height: 80vh;
            overflow-y: auto;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: left; font-size: 14px; }
        th { background: var(--dark); color: white; }

        .instructions {
            position: fixed;
            bottom: 10px;
            font-size: 10px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="instructions">Press Ctrl+Shift+A for Admin</div>

    <div id="customerSection" class="card">
        <h2>Customer Registration</h2>
        <form id="regForm">
            <div class="form-group">
                <label>Pura Naam</label>
                <input type="text" id="name" placeholder="Enter Name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Email ID" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="Phone Number" required>
            </div>
            <button type="submit" class="btn btn-submit">Submit Details</button>
        </form>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="adminSection" class="card">
        <div style="display:flex; justify-content: space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h2 style="margin:0;">Admin Panel</h2>
            <button onclick="closeAdmin()" style="background:#64748b; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Close</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <div style="margin-top: 20px; text-align: right;">
            <button onclick="clearData()" style="color:red; background:none; border:none; cursor:pointer;">Clear All History</button>
        </div>
    </div>

    <script>
        // Data Submit Logic
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                time: new Date().toLocaleString()
            };

            let database = JSON.parse(localStorage.getItem('myLeads')) || [];
            database.push(userData);
            localStorage.setItem('myLeads', JSON.stringify(database));

            alert('Details Submitted Successfully!');
            this.reset();
        });

        // Admin Access via Shortcut: Ctrl + Shift + A
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                const pass = prompt("Enter Admin Password:");
                if(pass === "1234") {
                    openAdmin();
                } else {
                    alert("Unauthorized Access!");
                }
            }
        });

        function openAdmin() {
            const data = JSON.parse(localStorage.getItem('myLeads')) || [];
            const tbody = document.getElementById('tableBody');
            
            tbody.innerHTML = data.length ? "" : "<tr><td colspan='4' style='text-align:center;'>No Data Found</td></tr>";
            
            data.reverse().forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>${item.time}</td>
                    <td>${item.name}</td>
                    <td>${item.email}</td>
                    <td>${item.phone}</td>
                </tr>`;
            });

            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAdmin() {
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function clearData() {
            if(confirm("Saara data delete kar dein?")) {
                localStorage.removeItem('myLeads');
                openAdmin();
            }
        }
    </script>
</body>
</html>
