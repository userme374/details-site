<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal & Admin Panel</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f1f5f9;
            color: var(--dark);
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #cbd5e1;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Form Styling */
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.submit-btn:hover {
            background: #16a34a;
        }

        /* Admin Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
        }

        .hidden {
            display: none;
        }

        .badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showPage('customer')">Customer Form</button>
        <button class="tab-btn" onclick="showPage('admin')">Admin Panel</button>
    </div>

    <div id="customerPage" class="card">
        <h2>Register Your Detail</h2>
        <form id="customerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="9876543210" required>
            </div>
            <button type="submit" class="submit-btn">Submit Details</button>
        </form>
    </div>

    <div id="adminPage" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Admin Dashboard</h2>
            <button onclick="clearData()" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Clear All</button>
        </div>
        <p>Yahan wo details hain jo customers ne bhari hain:</p>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Tab Switch Logic
    function showPage(page) {
        document.getElementById('customerPage').classList.add('hidden');
        document.getElementById('adminPage').classList.add('hidden');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

        if(page === 'customer') {
            document.getElementById('customerPage').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        } else {
            document.getElementById('adminPage').classList.remove('hidden');
            event.currentTarget.classList.add('active');
            loadAdminData();
        }
    }

    // Form Submission Logic
    document.getElementById('customerForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const customerData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            date: new Date().toLocaleString()
        };

        // Get existing data from LocalStorage or create new array
        let allEntries = JSON.parse(localStorage.getItem('customerLeads')) || [];
        allEntries.push(customerData);

        // Save back to LocalStorage
        localStorage.setItem('customerLeads', JSON.stringify(allEntries));

        alert('Success! Your details have been sent to Admin.');
        this.reset();
    });

    // Load Data in Admin Panel
    function loadAdminData() {
        const tableBody = document.getElementById('adminTableBody');
        const data = JSON.parse(localStorage.getItem('customerLeads')) || [];
        
        tableBody.innerHTML = '';

        if(data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No data found</td></tr>';
            return;
        }

        data.reverse().forEach(entry => {
            const row = `<tr>
                <td>${entry.date}</td>
                <td>${entry.name}</td>
                <td>${entry.email}</td>
                <td>${entry.phone}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // Clear Data Function
    function clearData() {
        if(confirm('Kya aap saara data delete karna chahte hain?')) {
            localStorage.removeItem('customerLeads');
            loadAdminData();
        }
    }
</script>

</body>
</html>
